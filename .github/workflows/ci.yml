name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Fetch all history and tags

    - name: Set up Go environment
      uses: actions/setup-go@v7
      with:
        go-version: '1.26'

    - name: Build
      run: make build

    - name: Test
      run: make test
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-output
        path: bin/
