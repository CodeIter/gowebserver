{{ define "home" }}
<div class="w3-card-4 w3-white w3-padding w3-margin-top">
    <header class="w3-container w3-blue">
        <h2>{{ .Title }}</h2>
    </header>
    <div class="w3-container w3-padding-16">
        <p class="w3-large">{{ .Message }}</p>
        <div class="w3-section">
            <a href="/health" class="w3-button w3-green">Health</a>
            <a href="/ready" class="w3-button w3-teal">Ready</a>
            <a href="/random/number/0/20" class="w3-button w3-purple">Random Number</a>
            <a href="/random/password/20" class="w3-button w3-orange">Random Password</a>
            <a href="/go/google.com/?q=go lang" class="w3-button w3-blue">Redirect</a>
        </div>
    </div>
</div>
{{ end }}
