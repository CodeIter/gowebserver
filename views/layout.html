{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
</head>
<body class="w3-light-grey">
    <div class="w3-bar w3-blue w3-large">
        <div class="w3-bar-item">Go Server</div>
    </div>

    <div class="w3-container w3-content w3-padding-64" style="max-width:900px">
        {{ template "content" . }}
    </div>

    <footer class="w3-container w3-blue w3-center w3-margin-top">
        <p>Powered by Go and W3.CSS</p>
    </footer>
</body>
</html>
{{ end }}
